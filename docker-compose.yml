services:

  postgres:
    image: postgres:15
    container_name: finflow_postgres
    environment:
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow123
      POSTGRES_DB: finflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ingestion/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow -d finflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: finflow_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.0
    container_name: finflow_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: finflow-cluster-1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finflow_kafka_ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  generator:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: finflow_generator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: finflow
      DB_PASSWORD: finflow123
      DB_NAME: finflow_db
      TRANSACTIONS_PER_SECOND: 2
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  producer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile.producer
    container_name: finflow_producer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: finflow
      DB_PASSWORD: finflow123
      DB_NAME: finflow_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POLL_INTERVAL_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  consumer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile.producer
    container_name: finflow_consumer
    command: ["python", "-u", "consumer.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: finflow_spark
    command: >
      spark-submit
      --master local[*]
      --driver-memory 1g
      /app/transform.py
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: finflow
      DB_PASSWORD: finflow123
      DB_NAME: finflow_db
      BRONZE_PATH: /data/bronze
      SILVER_PATH: /data/silver
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - spark

volumes:
  postgres_data:
